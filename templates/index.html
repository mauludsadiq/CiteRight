<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CiteRight</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f9f9f7; color: #1a1a1a; min-height: 100vh; }
  header { background: #1a1a1a; color: white; padding: 24px 40px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 1.4em; font-weight: normal; letter-spacing: 0.02em; }
  header span { font-size: 0.8em; color: #888; border-left: 1px solid #444; padding-left: 16px; }
  main { max-width: 720px; margin: 48px auto; padding: 0 24px; }
  .card { background: white; border: 1px solid #e0e0e0; border-radius: 4px; padding: 32px; margin-bottom: 24px; }
  h2 { font-size: 1.1em; margin-bottom: 20px; font-weight: normal; text-transform: uppercase; letter-spacing: 0.08em; color: #444; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 0.85em; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  input[type=text], input[type=file] { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 2px; font-size: 0.95em; font-family: inherit; }
  input[type=file] { background: #fafafa; cursor: pointer; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .toggle input { width: 18px; height: 18px; cursor: pointer; }
  .toggle label { margin: 0; text-transform: none; font-size: 0.9em; color: #333; }
  button { background: #1a1a1a; color: white; border: none; padding: 12px 28px; font-size: 0.95em; font-family: inherit; cursor: pointer; border-radius: 2px; width: 100%; margin-top: 8px; }
  button:hover { background: #333; }
  button:disabled { background: #999; cursor: not-allowed; }
  #result { display: none; }
  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat { text-align: center; padding: 20px; border: 1px solid #e0e0e0; border-radius: 4px; background: white; }
  .stat .number { font-size: 2.2em; font-weight: bold; }
  .stat .label { font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.08em; color: #777; margin-top: 4px; }
  .verified { color: #1a6b1a; }
  .unverified { color: #b30000; }
  .neutral { color: #1a1a1a; }
  table { width: 100%; border-collapse: collapse; font-size: 0.88em; }
  th { background: #1a1a1a; color: white; padding: 10px 12px; text-align: left; font-weight: normal; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.82em; }
  td { padding: 10px 12px; border-bottom: 1px solid #eee; vertical-align: top; }
  tr.unverified-row { background: #fff5f5; }
  .badge { font-weight: bold; font-size: 0.82em; }
  .badge.verified { color: #1a6b1a; }
  .badge.unverified { color: #b30000; }
  .attestation { font-size: 0.82em; color: #555; background: #f5f5f5; padding: 16px; border-left: 3px solid #ccc; line-height: 1.6; }
  .digest { font-family: monospace; font-size: 0.72em; color: #888; word-break: break-all; margin-top: 8px; }
  .spinner { display: none; text-align: center; padding: 24px; color: #888; }
  .error-box { background: #fff5f5; border: 1px solid #f0c0c0; padding: 16px; border-radius: 4px; color: #b30000; }
</style>
</head>
<body>
<header>
  <h1>CiteRight</h1>
  <span>Deterministic citation verification</span>
</header>
<main>
  <div class="card">
    <h2>Verify Document</h2>
    <div class="field">
      <label>Legal Document (.md, .txt, .docx, .pdf)</label>
      <input type="file" id="file" accept=".md,.txt,.docx,.pdf">
    </div>
    <div class="toggle">
      <input type="checkbox" id="live">
      <label for="live">Live mode — hit CourtListener API (requires token)</label>
    </div>
    <div class="field" id="token-field" style="display:none">
      <label>CourtListener Token</label>
      <input type="text" id="token" placeholder="Leave blank to use COURTLISTENER_TOKEN env var">
    </div>
    <h2 style="margin-top:20px">Attorney Attestation (optional)</h2>
    <div class="row">
      <div class="field">
        <label>Attorney Name</label>
        <input type="text" id="attorney_name" placeholder="Jane Smith">
      </div>
      <div class="field">
        <label>Bar Number</label>
        <input type="text" id="bar_number" placeholder="CA-123456">
      </div>
    </div>
    <div class="field">
      <label>Jurisdiction</label>
      <input type="text" id="jurisdiction" placeholder="California">
    </div>
    <button id="submit" onclick="submitForm()">Verify Citations</button>
  </div>

  <div class="spinner" id="spinner">Running verification pipeline...</div>

  <div id="result">
    <div class="summary">
      <div class="stat">
        <div class="number verified" id="stat-verified">-</div>
        <div class="label">Verified</div>
      </div>
      <div class="stat">
        <div class="number unverified" id="stat-unverified">-</div>
        <div class="label">Unverified</div>
      </div>
      <div class="stat">
        <div class="number neutral" id="stat-total">-</div>
        <div class="label">Total Citations</div>
      </div>
    </div>

    <div class="card">
      <h2>Citations</h2>
      <table>
        <thead>
          <tr><th>Status</th><th>Case Name</th><th>Canonical ID</th></tr>
        </thead>
        <tbody id="artifact-rows"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Audit Receipt</h2>
      <div class="attestation" id="attestation-text"></div>
      <div class="digest" id="receipt-digest"></div>
    </div>
  </div>
</main>
<script>
  document.getElementById("live").addEventListener("change", function() {
    document.getElementById("token-field").style.display = this.checked ? "block" : "none";
  });

  async function submitForm() {
    const file = document.getElementById("file").files[0];
    if (!file) { alert("Please select a document."); return; }

    const btn = document.getElementById("submit");
    btn.disabled = true;
    btn.textContent = "Verifying...";
    document.getElementById("spinner").style.display = "block";
    document.getElementById("result").style.display = "none";

    const form = new FormData();
    form.append("file", file);
    form.append("live", document.getElementById("live").checked ? "true" : "false");
    form.append("token", document.getElementById("token").value);
    form.append("attorney_name", document.getElementById("attorney_name").value);
    form.append("bar_number", document.getElementById("bar_number").value);
    form.append("jurisdiction", document.getElementById("jurisdiction").value);

    try {
      const resp = await fetch("/v1/verify", { method: "POST", body: form });
      const data = await resp.json();

      if (!resp.ok) {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("result").innerHTML = `<div class="card"><div class="error-box">${data.error || "Unknown error"}</div></div>`;
        document.getElementById("result").style.display = "block";
        return;
      }

      const artifacts = data.artifacts || [];
      const verified = data.verified_count || 0;
      const unverified = data.unverified_count || 0;

      document.getElementById("stat-verified").textContent = verified;
      document.getElementById("stat-unverified").textContent = unverified;
      document.getElementById("stat-total").textContent = artifacts.length;

      const tbody = document.getElementById("artifact-rows");
      tbody.innerHTML = "";
      artifacts.forEach(a => {
        const isVerified = a.verification_status && a.verification_status.status === "VERIFIED";
        const row = document.createElement("tr");
        if (!isVerified) row.className = "unverified-row";
        row.innerHTML = `
          <td><span class="badge ${isVerified ? "verified" : "unverified"}">${isVerified ? "VERIFIED" : "UNVERIFIED"}</span></td>
          <td>${a.case_name || "-"}</td>
          <td><code>${a.canonical_id || "-"}</code></td>
        `;
        tbody.appendChild(row);
      });

      document.getElementById("attestation-text").textContent = data.attestation_text || "No attestation generated.";
      document.getElementById("receipt-digest").textContent = "Receipt digest: " + (data.receipt_digest || "-");

      document.getElementById("spinner").style.display = "none";
      document.getElementById("result").style.display = "block";
    } catch(e) {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("result").innerHTML = `<div class="card"><div class="error-box">Request failed: ${e.message}</div></div>`;
      document.getElementById("result").style.display = "block";
    } finally {
      btn.disabled = false;
      btn.textContent = "Verify Citations";
    }
  }
</script>
</body>
</html>
